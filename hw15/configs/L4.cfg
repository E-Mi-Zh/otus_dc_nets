! device: L4 (vEOS-lab, EOS-4.35.1F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
hostname L4
!
spanning-tree mode mstp
no spanning-tree vlan-id 4094
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 10
   name VLAN10
!
vlan 20
   name VLAN20
!
vlan 1111,2222
!
vlan 4094
   name MLAG-PEERLINK
   trunk group MLAG-PEERLINK
!
vrf instance VRF1
!
vrf instance VRF2
!
interface Port-Channel1
   switchport mode trunk
   mlag 1
!
interface Port-Channel2
   switchport mode trunk
   mlag 2
!
interface Port-Channel67
   mtu 9214
   switchport mode trunk
   switchport trunk group MLAG-PEERLINK
   spanning-tree link-type point-to-point
!
interface Ethernet1
   mtu 9214
   no switchport
   ip address 172.16.1.7/31
!
interface Ethernet2
   mtu 9214
   no switchport
   ip address 172.16.2.7/31
!
interface Ethernet3
   switchport mode trunk
   channel-group 2 mode active
!
interface Ethernet4
   switchport mode trunk
   channel-group 1 mode active
!
interface Ethernet5
   no switchport
   ip address 192.168.0.2/30
!
interface Ethernet6
   mtu 9214
   channel-group 67 mode active
!
interface Ethernet7
   mtu 9214
   channel-group 67 mode active
!
interface Loopback0
   ip address 10.0.0.4/32
!
interface Loopback1
   ip address 10.10.0.4/32
!
interface Loopback2
   ip address 10.10.0.103/32
!
interface Management1
!
interface Vlan10
   vrf VRF1
   ip address 192.168.1.204/24
   ip virtual-router address 192.168.1.254
!
interface Vlan20
   vrf VRF2
   ip address 192.168.2.204/24
   ip virtual-router address 192.168.2.254
!
interface Vlan4094
   no autostate
   ip address 172.16.0.2/30
!
interface Vxlan1
   vxlan source-interface Loopback2
   vxlan udp-port 4789
   vxlan vlan 10 vni 100010
   vxlan vlan 20 vni 100020
   vxlan vrf VRF1 vni 111111
   vxlan vrf VRF2 vni 222222
   vxlan learn-restrict any
!
ip virtual-router mac-address ca:fe:ba:be:00:00
!
ip routing
ip routing vrf VRF1
ip routing vrf VRF2
!
ip prefix-list EXTERNAL_ROUTES seq 10 permit 8.8.8.8/32
!
mlag configuration
   domain-id LEAVES-3-4
   local-interface Vlan4094
   peer-address 172.16.0.1
   peer-address heartbeat 192.168.0.1
   peer-link Port-Channel67
   dual-primary detection delay 1 action errdisable all-interfaces
!
router bgp 65503
   router-id 10.0.0.4
   no bgp default ipv4-unicast
   timers bgp 10 30
   maximum-paths 2 ecmp 2
   neighbor EVPN peer group
   neighbor EVPN remote-as 65500
   neighbor EVPN update-source Loopback1
   neighbor EVPN bfd
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN password 7 M+hBrrkH3ArRfYYHe6HDng==
   neighbor EVPN send-community extended
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 65500
   neighbor UNDERLAY bfd
   neighbor UNDERLAY password 7 gv6sVndNHh8/e/Z0vgMzFw==
   neighbor UNDERLAY-MLAG peer group
   neighbor UNDERLAY-MLAG remote-as 65503
   neighbor UNDERLAY-MLAG next-hop-self
   neighbor 10.10.1.1 peer group EVPN
   neighbor 10.10.2.2 peer group EVPN
   neighbor 172.16.0.1 peer group UNDERLAY-MLAG
   neighbor 172.16.1.6 peer group UNDERLAY
   neighbor 172.16.2.6 peer group UNDERLAY
   !
   vlan 10
      rd auto
      route-target both 10:100010
      redistribute learned
   !
   vlan 20
      rd auto
      route-target both 20:100020
      redistribute learned
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      neighbor UNDERLAY activate
      neighbor UNDERLAY-MLAG activate
      network 10.0.0.4/32
      network 10.10.0.4/32
      network 10.10.0.100/32
      network 10.10.0.103/32
   !
   vrf VRF1
      rd 65503:2
      route-target import evpn 1:111111
      route-target import evpn 2:222222
      route-target export evpn 1:111111
      route-target export evpn 2:222222
      neighbor 192.168.1.2 remote-as 65534
      redistribute connected
      !
      address-family ipv4
         neighbor 192.168.1.2 activate
         neighbor 192.168.1.2 prefix-list EXTERNAL_ROUTES in
   !
   vrf VRF2
      rd 65503:22
      route-target import evpn 1:111111
      route-target import evpn 2:222222
      route-target export evpn 1:111111
      route-target export evpn 2:222222
      redistribute connected
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
end