! device: L2 (vEOS-lab, EOS-4.35.1F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
hostname L2
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 20
!
vrf instance VRF1
!
interface Ethernet1
   no switchport
   ip address 172.16.1.3/31
!
interface Ethernet2
   no switchport
   ip address 172.16.2.3/31
!
interface Ethernet3
   switchport access vlan 20
!
interface Ethernet4
!
interface Ethernet5
!
interface Loopback0
   ip address 10.0.0.8/32
!
interface Loopback1
   ip address 10.10.0.8/32
!
interface Management1
!
interface Vlan20
   vrf VRF1
   ip address 192.168.2.201/24
   ip virtual-router address 192.168.2.254
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 10 vni 100010
   vxlan vlan 20 vni 100020
   vxlan vrf VRF1 vni 111111
   vxlan learn-restrict any
!
ip virtual-router mac-address ca:fe:ba:be:00:00
!
ip routing
ip routing vrf VRF1
!
router bgp 64011
   router-id 10.0.0.8
   no bgp default ipv4-unicast
   maximum-paths 2
   neighbor EVPN peer group
   neighbor EVPN remote-as 64001
   neighbor EVPN next-hop-unchanged
   neighbor EVPN update-source Loopback1
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 64001
   neighbor 10.10.0.3 peer group EVPN
   neighbor 10.10.0.4 peer group EVPN
   neighbor 172.16.1.2 peer group UNDERLAY
   neighbor 172.16.2.2 peer group UNDERLAY
   !
   vlan 10
      rd auto
      route-target both 10:100010
      redistribute learned
   !
   vlan 20
      rd auto
      route-target both 20:100020
      redistribute learned
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      neighbor UNDERLAY activate
      network 10.0.0.8/32
      network 10.10.0.8/32
   !
   vrf VRF1
      rd 64011:1
      route-target import evpn 1:111111
      route-target export evpn 1:111111
      redistribute connected
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
end