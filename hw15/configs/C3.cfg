! device: C3 (vEOS-lab, EOS-4.35.1F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
hostname C3
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 10,20,100
!
vrf instance VRF1
!
vrf instance VRF2
!
interface Port-Channel1
   switchport mode trunk
!
interface Ethernet1
   channel-group 1 mode active
!
interface Ethernet2
   channel-group 1 mode active
!
interface Ethernet3
!
interface Loopback0
   ip address 10.0.0.100/32
!
interface Loopback1
   ip address 10.10.0.100/32
!
interface Management1
!
interface Vlan10
   vrf VRF1
   ip address 192.168.1.253/24
!
interface Vlan20
   vrf VRF2
   ip address 192.168.2.253/24
!
interface Vlan100
   ip address 172.16.100.2/29
!
ip routing
ip routing vrf VRF1
ip routing vrf VRF2
!
ip route vrf VRF1 192.168.2.0/24 Vlan20
ip route vrf VRF2 192.168.1.0/24 Vlan10
!
router bgp 65534
   router-id 10.0.0.100
   no bgp default ipv4-unicast
   timers bgp 10 30
   maximum-paths 2 ecmp 2
   neighbor EVPN peer group
   neighbor EVPN remote-as 65503
   neighbor EVPN update-source Loopback1
   neighbor EVPN bfd
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN password 7 M+hBrrkH3ArRfYYHe6HDng==
   neighbor EVPN send-community extended
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 65503
   neighbor UNDERLAY bfd
   neighbor 10.10.0.3 peer group EVPN
   neighbor 10.10.0.4 peer group EVPN
   neighbor 172.16.100.3 peer group UNDERLAY
   neighbor 172.16.100.4 peer group UNDERLAY
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      neighbor EVPN activate
      neighbor UNDERLAY activate
      network 10.0.0.100/32
      network 10.10.0.100/32
   !
   vrf VRF1
      rd 65534:1
      route-target import evpn 1:111111
      route-target import evpn 2:222222
      route-target export evpn 1:111111
      aggregate-address 192.168.2.0/24 summary-only
      redistribute connected
      redistribute static
   !
   vrf VRF2
      rd 65534:2
      route-target import evpn 1:111111
      route-target import evpn 2:222222
      route-target export evpn 2:222222
      aggregate-address 192.168.1.0/24 summary-only
      redistribute connected
      redistribute static
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
end