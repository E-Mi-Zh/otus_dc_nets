! device: L2 (vEOS-lab, EOS-4.35.1F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
hostname L2
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 10
   name VLAN10
!
vlan 20
   name VLAN20
!
vrf instance VRF1
!
vrf instance VRF2
!
interface Port-Channel1
   switchport mode trunk
   !
   evpn ethernet-segment
      identifier 0000:0000:0000:0000:1201
      route-target import 00:00:00:00:12:01
   lacp system-id 0000.0000.1201
!
interface Port-Channel2
   switchport mode trunk
   !
   evpn ethernet-segment
      identifier 0000:0000:0000:0000:1202
      route-target import 00:00:00:00:12:02
   lacp system-id 0000.0000.1202
!
interface Ethernet1
   mtu 9214
   no switchport
   ip address 172.16.1.3/31
!
interface Ethernet2
   mtu 9214
   no switchport
   ip address 172.16.2.3/31
!
interface Ethernet3
   switchport mode trunk
   channel-group 2 mode active
!
interface Ethernet4
   channel-group 1 mode active
!
interface Ethernet5
!
interface Ethernet6
!
interface Ethernet7
!
interface Loopback0
   ip address 10.0.0.2/32
!
interface Loopback1
   ip address 10.10.0.2/32
!
interface Management1
!
interface Vlan10
   vrf VRF1
   ip address 192.168.1.202/24
   ip virtual-router address 192.168.1.254
!
interface Vlan20
   vrf VRF2
   ip address 192.168.2.202/24
   ip virtual-router address 192.168.2.254
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 10 vni 100010
   vxlan vlan 20 vni 100020
   vxlan vrf VRF1 vni 111111
   vxlan vrf VRF2 vni 222222
   vxlan learn-restrict any
!
ip virtual-router mac-address ca:fe:ba:be:00:00
!
ip routing
ip routing vrf VRF1
ip routing vrf VRF2
!
router bgp 65502
   router-id 10.0.0.2
   no bgp default ipv4-unicast
   timers bgp 10 30
   maximum-paths 2 ecmp 2
   neighbor EVPN peer group
   neighbor EVPN remote-as 65500
   neighbor EVPN next-hop-unchanged
   neighbor EVPN update-source Loopback1
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN password 7 M+hBrrkH3ArRfYYHe6HDng==
   neighbor EVPN send-community extended
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 65500
   neighbor UNDERLAY bfd
   neighbor UNDERLAY password 7 gv6sVndNHh8/e/Z0vgMzFw==
   neighbor 10.10.1.1 peer group EVPN
   neighbor 10.10.2.2 peer group EVPN
   neighbor 172.16.1.2 peer group UNDERLAY
   neighbor 172.16.2.2 peer group UNDERLAY
   !
   vlan 10
      rd auto
      route-target both 10:100010
      redistribute learned
   !
   vlan 20
      rd auto
      route-target both 20:100020
      redistribute learned
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      neighbor UNDERLAY activate
      network 10.0.0.2/32
      network 10.10.0.2/32
   !
   vrf VRF1
      rd 65502:1
      route-target import evpn 1:111111
      route-target export evpn 1:111111
      redistribute connected
   !
   vrf VRF2
      rd 65502:2
      route-target import evpn 2:222222
      route-target export evpn 2:222222
      redistribute connected
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
end