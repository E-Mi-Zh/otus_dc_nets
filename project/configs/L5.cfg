! device: L5 (vEOS-lab, EOS-4.35.1F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
hostname L5
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 40
!
vrf instance VRF1
!
interface Ethernet1
   no switchport
   ip address 172.16.3.3/31
!
interface Ethernet2
   no switchport
   ip address 172.16.4.3/31
!
interface Ethernet3
   switchport access vlan 40
!
interface Ethernet4
!
interface Ethernet5
!
interface Loopback0
   ip address 10.0.0.11/32
!
interface Loopback1
   ip address 10.10.0.11/32
!
interface Management1
!
interface Vlan40
   vrf VRF1
   ip address 192.168.4.201/24
   ip virtual-router address 192.168.4.254
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan udp-port 4789
   vxlan vlan 30 vni 100030
   vxlan vlan 40 vni 100040
   vxlan vrf VRF1 vni 111111
   vxlan learn-restrict any
!
ip virtual-router mac-address ca:fe:be:ef:00:00
!
ip routing
ip routing vrf VRF1
!
router bgp 64052
   router-id 10.0.0.11
   no bgp default ipv4-unicast
   maximum-paths 2
   neighbor EVPN peer group
   neighbor EVPN remote-as 64002
   neighbor EVPN next-hop-unchanged
   neighbor EVPN update-source Loopback1
   neighbor EVPN ebgp-multihop 3
   neighbor EVPN send-community extended
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 64002
   neighbor 10.10.0.5 peer group EVPN
   neighbor 10.10.0.6 peer group EVPN
   neighbor 172.16.3.2 peer group UNDERLAY
   neighbor 172.16.4.2 peer group UNDERLAY
   !
   vlan 30
      rd auto
      route-target both 30:100030
      redistribute learned
   !
   vlan 40
      rd auto
      route-target both 40:100040
      redistribute learned
   !
   address-family evpn
      neighbor EVPN activate
   !
   address-family ipv4
      neighbor UNDERLAY activate
      network 10.0.0.11/32
      network 10.10.0.11/32
   !
   vrf VRF1
      rd 64052:1
      route-target import evpn 1:111111
      route-target export evpn 1:111111
      redistribute connected
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
end